version: 2

project_name: taso

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Hossiy21/taso/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

brews:
  - repository:
      owner: Hossiy21
      name: homebrew-tap
      token: "{{ .Env.CUSTOM_GITHUB_TOKEN }}"
    homepage: "https://github.com/Hossiy21/taso"
    description: "Find env vars your code calls but don't exist in your .env files"
    license: "MIT"

scoops:
  - repository:
      owner: Hossiy21
      name: scoop-bucket
      token: "{{ .Env.CUSTOM_GITHUB_TOKEN }}"
    homepage: "https://github.com/Hossiy21/taso"
    description: "Find env vars your code calls but don't exist in your .env files"
    license: "MIT"
